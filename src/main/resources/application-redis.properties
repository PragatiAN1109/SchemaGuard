# Redis connection settings for the 'redis' profile.
# REDIS_HOST env var is set by Docker Compose to the service name 'redis'.
# Falls back to localhost for direct local runs (redis-server running natively).
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=5000ms

# ── Elasticsearch connection ─────────────────────────────────────────────
# ELASTIC_HOST is set to 'elasticsearch' (service name) by Docker Compose.
# Falls back to localhost for direct local runs.
elastic.host=${ELASTIC_HOST:localhost}
elastic.port=${ELASTIC_PORT:9200}

# ── Google OAuth2 / JWT configuration ────────────────────────────────
# Set GOOGLE_CLIENT_ID to your Google OAuth2 Client ID.
# This is used to validate the 'aud' claim in incoming Bearer tokens.
# Never hardcode this value — pass it via environment variable.
#
# Local run:  export GOOGLE_CLIENT_ID=<your-client-id>.apps.googleusercontent.com
# Docker:     set GOOGLE_CLIENT_ID in compose.yaml environment section
google.client-id=${GOOGLE_CLIENT_ID}
