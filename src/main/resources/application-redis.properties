# Redis connection settings for the 'redis' profile.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=5000ms

# в”Ђв”Ђ Elasticsearch connection в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
elastic.host=${ELASTIC_HOST:localhost}
elastic.port=${ELASTIC_PORT:9200}

# в”Ђв”Ђ Redis Streams вЂ” event publisher в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
index.events.stream=${INDEX_EVENTS_STREAM:schemaguard:index-events}

# в”Ђв”Ђ Redis Streams вЂ” indexer worker в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
index.worker.group=${INDEX_WORKER_GROUP:schemaguard-indexers}
index.worker.consumer=${INDEX_WORKER_CONSUMER:indexer-1}
index.worker.batch-size=${INDEX_WORKER_BATCH_SIZE:10}
index.worker.block-ms=${INDEX_WORKER_BLOCK_MS:2000}
index.worker.poll-interval-ms=${INDEX_WORKER_POLL_INTERVAL_MS:1000}

# в”Ђв”Ђ Google OAuth2 / JWT configuration в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
google.client-id=${GOOGLE_CLIENT_ID}
