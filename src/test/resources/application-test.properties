# Test profile configuration.
# Overrides the default 'redis' profile — tests always use InMemoryKeyValueStore.
# No Redis connection required to run the test suite.
spring.profiles.active=test
server.port=0

# Disable Spring Security for tests so existing integration tests don't need tokens.
# Tests focus on business logic (CRUD, ETag, schema validation) not auth.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=
google.client-id=test-client-id
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
