# Test profile configuration.
# Tests always use InMemoryKeyValueStore — no Redis, no Google token required.
# The 'test' profile is activated via @ActiveProfiles("test") on the test classes,
# NOT via spring.profiles.active here (not allowed in profile-specific files).
server.port=0
google.client-id=test-client-id
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
